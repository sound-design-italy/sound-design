<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENVMODE — Audio Design Laboratory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600&display=swap');

:root {
  --bg: #060606;
  --white: #ECECEC;
  --white-dim: #999999;
  --red: #B01800;
  --grey: #2a2a2a;
  --grey-mid: #555555;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow Condensed', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--mono);
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 24px 20px;
  position: relative;
}
.menu-btn {
  position: absolute;
  top: 36px;
  right: 28px;
  width: 34px;
  height: 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  z-index: 200;
}
.menu-btn span {
  display: block;
  height: 1px;
  background: var(--white);
  width: 100%;
}
.logo-svg { width: 78px; height: 40px; margin-bottom: 14px; }
.brand-text {
  font-size: 26px;
  letter-spacing: 0.28em;
  color: var(--white);
  font-weight: 400;
}
.nav-rule {
  width: 100%;
  max-width: 900px;
  height: 1px;
  background: #2a2a2a;
  margin-top: 24px;
}

/* ── OVERLAY MENU ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(6,6,6,0.98);
  z-index: 999;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
}
.overlay.open { display: flex; }
.overlay-close {
  position: absolute;
  top: 36px;
  right: 28px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  background: none;
  border: none;
}
.overlay-close::before, .overlay-close::after {
  content: '';
  position: absolute;
  top: 50%; left: 0;
  width: 100%;
  height: 1px;
  background: var(--white);
}
.overlay-close::before { transform: rotate(45deg); }
.overlay-close::after { transform: rotate(-45deg); }

.overlay-link {
  font-family: var(--mono);
  font-size: 16px;
  letter-spacing: 0.25em;
  color: var(--white);
  text-decoration: none;
  padding: 8px 0;
  border-bottom: 1px solid transparent;
  transition: border-color 0.25s, color 0.25s;
}
.overlay-link:hover {
  border-color: var(--red);
  color: var(--white);
}
.overlay-index {
  font-size: 9px;
  color: var(--grey-mid);
  letter-spacing: 0.2em;
  margin-bottom: -20px;
}

/* ── HERO ── */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 60px 24px 50px;
}
.module-frame {
  max-width: 380px;
  width: 100%;
  margin-bottom: 50px;
}
.module-frame img {
  width: 100%;
  display: block;
  filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
}

.hero-desc {
  font-family: var(--sans);
  font-weight: 300;
  font-size: 17px;
  letter-spacing: 0.03em;
  color: var(--white-dim);
  line-height: 1.7;
  max-width: 480px;
  margin-bottom: 28px;
}

.hero-sep {
  width: 36px;
  height: 1px;
  background: var(--grey-mid);
  margin-bottom: 28px;
}

.btn-enter {
  display: block;
  width: 100%;
  max-width: 480px;
  padding: 22px 0;
  text-align: center;
  border: 1px solid var(--white);
  background: var(--white);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 16px;
  letter-spacing: 0.3em;
  text-decoration: none;
  position: relative;
  transition: background 0.25s, color 0.25s;
}
.btn-enter:hover { background: transparent; color: var(--white); }
.btn-enter::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 26px; height: 26px;
  border-bottom: 1px solid var(--white);
  border-right: none;
  background: linear-gradient(to top left, transparent 49%, var(--bg) 50%);
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid #1c1c1c;
  padding: 24px 24px 40px;
  text-align: center;
}
.footer-links {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--grey-mid);
}
.footer-links span { color: #333; }

@media (min-width: 700px) {
  .hero-desc { font-size: 18px; }
}
</style>
</head>
